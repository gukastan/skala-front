  <section class="subpage-hero">
    <div>
      <p class="hero-kicker">ADMISSION FORM</p>
      <h1>SKALA 입과 등록서</h1>
      <p class="hero-copy">입력 목적에 맞는 form 요소를 사용해 등록 화면을 구성합니다.</p>

  <main id="main-content" class="subpage-main">
    <nav class="subpage-nav">
      <a href="./html-room.html#html-lessons">HTML 구조관으로 돌아가기</a>
      <a href="./lobby.html">로비</a>
    </nav>

<section class="form-card">
  <form action="./signUpResult.html" method="get">
    <fieldset>
      <legend>교육 계정</legend>
      <div class="form-grid">
        <div class="form-group">
          <label for="student-id">교육생 ID</label>
          <input id="student-id" name="studentId" type="text" minlength="4" maxlength="15" required>
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input id="email" name="email" type="email" required>
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" minlength="8" required>
        </div>
        <div class="form-group">
          <label for="level">현재 학습 수준</label>
          <select id="level" name="level" required>
            <option value="">선택</option><option value="입문">입문</option>
            <option value="기초">기초</option><option value="중급">중급</option>
          </select>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>교육생 프로필</legend>
      <div class="form-group">
        <label for="name">이름</label>
        <input id="name" name="name" type="text" value="김선경" required>
      </div>

      <div class="form-group">
        <span class="group-label">관심 분야</span>
        <div class="inline-options">
          <label><input type="checkbox" name="interest" value="HTML"> HTML</label>
          <label><input type="checkbox" name="interest" value="CSS"> CSS</label>
          <label><input type="checkbox" name="interest" value="JavaScript"> JavaScript</label>
          <label><input type="checkbox" name="interest" value="AI 서비스"> AI 서비스</label>
        </div>
      </div>

      <div class="form-group">
        <label for="introduction">입과 포부</label>
        <textarea id="introduction" name="introduction" maxlength="200"></textarea>
        <p id="intro-count" class="char-count">0 / 200</p>
      </div>

      <div class="inline-options">
        <label><input type="checkbox" name="agreement" value="동의" required> 개인정보 수집에 동의합니다.</label>
      </div>
    </fieldset>

    <div class="form-actions">
      <button class="form-submit" type="submit">입과 등록 완료</button>
      <button class="form-reset" type="reset">다시 작성</button>
    </div>
  </form>
</section>

  </main>

<footer class="site-footer">
  <div><strong>SKALA CODE ESCAPE</strong><p>HTML·CSS·JavaScript·Git 학습을 위한 비공식 개인 프로젝트 MVP</p></div>
  
</footer>

</html>
